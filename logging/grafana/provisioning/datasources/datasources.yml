# Grafana Datasource Provisioning — Jepangku Infra
# https://grafana.com/docs/grafana/latest/administration/provisioning/
#
# Datasource Loki otomatis terdaftar saat Grafana pertama kali jalan.
# Tidak perlu setup manual via UI.
# Melayani semua service: jepangku-news, jepangku-core, jepangkuLMS

apiVersion: 1

# Hapus datasource lama jika UID berubah (hindari crash Grafana 12+)
deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 5000
