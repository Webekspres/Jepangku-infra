# Grafana Loki Configuration — Jepangku Infra
# https://grafana.com/docs/loki/latest/configuration/
#
# Storage: filesystem (bind mount), bukan S3 (irit biaya VPS).
# Retention: 7 hari — cukup untuk debugging, tidak penuh disk.
# Melayani semua service: jepangku-news, jepangku-core, jepangkuLMS

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

# Single-node: pakai memberlist (gossip), bukan Consul
memberlist:
  join_members: []
  abort_if_cluster_join_fails: false

limits_config:
  # Retention log — 7 hari (168 jam)
  retention_period: 168h
  # Terima log sampai 7 hari ke belakang (hindari error "entry too far behind"
  # saat Promtail catch-up log lama dari Docker API setelah restart).
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # Maks ukuran per baris log (100KB — cukup untuk JSON panjang)
  max_line_size: 100KB
  # Maks query yang bisa di-return (5000 baris)
  max_entries_limit_per_query: 5000
  # Rate limit ingestion
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# Schema terbaru yang direkomendasikan untuk Loki
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ─══════════════════════════════════════════════════════════════
# Ruler — Loki Alerting (Phase 6.2)
# https://grafana.com/docs/loki/latest/operations/ruler/
# ─══════════════════════════════════════════════════════════════
# Rules disimpan di filesystem (bukan API) agar dapat di-version control.
# Directory: /loki/rules/fake/ — mount dari loki/rules/
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://grafana:3000/alertmanager
  enable_alertmanager_v2: true
  ring:
    kvstore:
      store: inmemory
  enable_api: false

# Analytics dimatikan agar tidak call home
analytics:
  reporting_enabled: false
