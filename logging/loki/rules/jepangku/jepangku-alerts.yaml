# Grafana Loki Alert Rules — Jepangku Infra
# Contact point (Telegram/Slack/Email) harus dikonfigurasi manual di Grafana.

groups:
  - name: jepangku-news-critical
    interval: 1m
    rules:
      - alert: JepangkuNews_HighErrorRate
        expr: |
          sum(count_over_time({service="jepangku-news"} | json | level="error" [1m])) > 5
        for: 2m
        labels:
          severity: critical
          service: jepangku-news
        annotations:
          summary: "Error rate > 5 per menit pada jepangku-news"
          description: |
            Error rate mencapai {{ $value }} per menit selama 2 menit terakhir.

      - alert: JepangkuNews_HighLatencyP95
        expr: |
          max(quantile_over_time(0.95, {service="jepangku-news"} | json | durationMs > 0 | unwrap durationMs [5m]) by (path)) > 5000
        for: 5m
        labels:
          severity: warning
          service: jepangku-news
        annotations:
          summary: "P95 latency > 5 detik pada satu atau lebih endpoint"
          description: "P95 latency mencapai {{ $value }} ms."

      - alert: JepangkuNews_CrashLoop
        expr: |
          sum(count_over_time({service="jepangku-news"} | json | level="error" or level="fatal" [1m])) > 3
        for: 1m
        labels:
          severity: critical
          service: jepangku-news
        annotations:
          summary: "Crash loop terdeteksi pada jepangku-news"
          description: "{{ $value }} error/fatal dalam 1 menit."

  - name: jepangku-news-warnings
    interval: 5m
    rules:
      - alert: JepangkuNews_ErrorRateWarning
        expr: |
          sum(count_over_time({service="jepangku-news"} | json | level="error" [5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: jepangku-news
        annotations:
          summary: "Error rate meningkat — >2 error/menit dalam 5 menit"
          description: "Total {{ $value }} error dalam 5 menit terakhir."

      - alert: JepangkuNews_High5xxRate
        expr: |
          (
            sum(count_over_time({service="jepangku-news"} | json | status >= 500 [5m]))
            /
            sum(count_over_time({service="jepangku-news"} | json | status >= 200 [5m]))
          ) * 100 > 10
        for: 5m
        labels:
          severity: warning
          service: jepangku-news
        annotations:
          summary: "5xx rate > 10% dalam 5 menit"
          description: "{{ $value }}% request mengembalikan 5xx."

      - alert: JepangkuNews_CoreApiDegraded
        expr: |
          sum(count_over_time({service="jepangku-news"} | json | module="core.client" | level="warn" [5m])) > 5
        for: 5m
        labels:
          severity: warning
          service: jepangku-news
        annotations:
          summary: "Core API calls mengalami kegagalan"
          description: "{{ $value }} warning dari core.client dalam 5 menit."

  - name: jepangku-infra
    interval: 1m
    rules:
      - alert: JepangkuInfra_DiskSpace
        expr: |
          sum(count_over_time({container="jepangku-loki"} |= "out of disk space" [5m])) > 0
        for: 1m
        labels:
          severity: critical
          service: jepangku-infra
        annotations:
          summary: "Loki kehabisan disk space"
          description: "Segera pruning log atau tambah kapasitas disk."

      # Origin (Next.js/core) tidak merespons di localhost — setara "uptime down"
      - alert: JepangkuOrigin_Down
        expr: |
          sum(count_over_time({service="origin-uptime"} | json | state="DOWN" [2m])) > 0
        for: 2m
        labels:
          severity: critical
          service: jepangku-infra
        annotations:
          summary: "Origin di balik Nginx DOWN"
          description: |
            Probe localhost (portal/lms/core) mencatat state=DOWN ≥2 menit.
            Query: {service="origin-uptime"} | json | state="DOWN"

      # Container prod di-stop / die / oom — penyebab downtime semalam
      - alert: JepangkuContainer_LifecycleCritical
        expr: |
          sum(
            count_over_time(
              {service="docker-events"}
              |~ "jepangku_(portal|lms|core|db|redis)"
              |~ "\"(stop|die|oom|kill)\""
              [2m]
            )
          ) > 0
        for: 0m
        labels:
          severity: critical
          service: jepangku-infra
        annotations:
          summary: "Container produksi stop/die/oom/kill"
          description: |
            Ada event lifecycle kritis pada stack produksi.
            Query: {service="docker-events"} |~ "stop|die|oom"

      # Nginx melihat upstream gagal (connection refused / timed out)
      - alert: JepangkuNginx_UpstreamFailure
        expr: |
          sum(
            count_over_time(
              {job="nginx", log_type="error"}
              |~ "connect\\(\\) failed|upstream timed out|Connection refused|no live upstreams"
              [2m]
            )
          ) > 5
        for: 2m
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx upstream failure (502 path)"
          description: |
            {{ $value }} error upstream Nginx dalam 2 menit.
            Cek juga: {job="nginx", log_type="access"} |~ "us=\"502\"|us=\"504\""
