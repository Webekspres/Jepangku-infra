# Jepangku — Nginx upstream-aware access log
# Include dari http {} di /etc/nginx/nginx.conf:
#   include /etc/nginx/conf.d/jepangku-upstream-log.conf;
#
# Format ini menjawab: apakah 502 dari upstream timeout, connection refused,
# atau app mengembalikan 5xx? Lihat field us= / urt= / uct=.

log_format jepangku_upstream
  '$remote_addr - $remote_user [$time_local] '
  '"$request" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" '
  'host=$host '
  'rt=$request_time '
  'uct="$upstream_connect_time" '
  'uht="$upstream_header_time" '
  'urt="$upstream_response_time" '
  'us="$upstream_status" '
  'ua="$upstream_addr"';

# Default access log untuk semua vhost yang tidak override access_log.
access_log /var/log/nginx/access.log jepangku_upstream;
error_log  /var/log/nginx/error.log warn;
