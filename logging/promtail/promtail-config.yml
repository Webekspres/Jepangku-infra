# Promtail Configuration — Jepangku Infra
# Sumber: Docker SD + Nginx + host logs (docker-events, origin-uptime)

server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

client:
  url: http://loki:3100/loki/api/v1/push
  batchwait: 5s
  batchsize: 1048576

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            module: module
            status: status
            durationMs: durationMs
            path: path
      - labels:
          service:
          level:

  - job_name: nginx-access
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          log_type: access
          service: nginx
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) .* \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+)[^"]*" (?P<status>\d+) (?P<body_bytes_sent>\d+) ".*" ".*" host=(?P<host>\S+) rt=(?P<request_time>\S+) uct="(?P<upstream_connect_time>[^"]*)" uht="(?P<upstream_header_time>[^"]*)" urt="(?P<upstream_response_time>[^"]*)" us="(?P<upstream_status>[^"]*)" ua="(?P<upstream_addr>[^"]*)"'
      - labels:
          host:
          status:
          upstream_status:

  - job_name: nginx-error
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          log_type: error
          service: nginx
          __path__: /var/log/nginx/error.log

  - job_name: docker-events
    static_configs:
      - targets: [localhost]
        labels:
          job: jepangku-host
          service: docker-events
          __path__: /var/log/jepangku/docker-events.log
    pipeline_stages:
      - json:
          expressions:
            Action: Action
            ActorName: Actor.Attributes.name
            exitCode: Actor.Attributes.exitCode
      - labels:
          Action:

  - job_name: origin-uptime
    static_configs:
      - targets: [localhost]
        labels:
          job: jepangku-host
          service: origin-uptime
          __path__: /var/log/jepangku/origin-uptime.log
    pipeline_stages:
      - json:
          expressions:
            state: state
            target: target
            event: event
      - labels:
          state:
          target:
