# Promtail Configuration — Jepangku Infra
# https://grafana.com/docs/loki/latest/clients/promtail/configuration/
#
# Mengumpulkan log dari SEMUA container Docker via Docker API (docker_sd).
# Melayani semua service: jepangku-news, jepangku-core, jepangkuLMS
#
# Label yang dihasilkan (low-cardinality, aman untuk Loki):
#   container → nama container (mis. jepangku_portal, jepangku_lms)
#   service   → field JSON `service` dari Pino (mis. jepangku-news)
#   level     → field JSON `level` (info/warn/error)
#
# CATATAN: job fallback `docker_files` sengaja DIHAPUS. Job itu membaca ulang
# seluruh file *-json.log dari awal setiap restart → memicu error Loki
# "entry too far behind" (timestamp too old) dan label `filename` yang tak
# terbaca. docker_sd men-tail via Docker API dengan posisi tersimpan.

server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

client:
  url: http://loki:3100/loki/api/v1/push
  # Batch timeout — kirim tiap 5 detik atau 1MB
  batchwait: 5s
  batchsize: 1048576

scrape_configs:
  # -------------------------------------------------------
  # Docker container logs (via Docker API)
  # -------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Label container name. Leading slash opsional (beda antar versi promtail:
      # 3.6.x kadang tanpa "/"). "/?(.*)" cocok untuk keduanya.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container
      # job label otomatis = job_name ("docker"), tak perlu di-override manual.

    pipeline_stages:
      # Parse JSON log dari Pino (Next.js apps). Container non-JSON (postgres,
      # redis) akan gagal parse tanpa error — hanya tak punya label service/level.
      - json:
          expressions:
            level: level
            service: service
            module: module
            status: status
            durationMs: durationMs
            path: path

      # Promosikan field low-cardinality menjadi label
      - labels:
          service:
          level:
